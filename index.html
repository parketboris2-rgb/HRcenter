    <style>
        /* БАЗОВЫЕ СТИЛИ */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .card {
            background: #1e1e1e;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        h2 span { color: #d4af37; }

        p {
            font-size: 16px;
            line-height: 1.7;
            color: #b0b0b0;
            margin-bottom: 35px;
            font-weight: 300;
        }

        .btn {
            display: block;
            background: #d4af37;
            color: #121212;
            padding: 18px 20px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 800;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
            border: 2px solid #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: transparent;
            color: #d4af37;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .btn-icon { margin-right: 10px; font-size: 18px; font-weight: 300; }

        @media (max-width: 375px) {
            .card { padding: 40px 20px; }
            h2 { font-size: 22px; }
            p { font-size: 15px; }
            .btn { font-size: 16px; padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 40px; margin-bottom: 20px; color: #d4af37; font-weight: 200;">🏛️</div>

        <h2>Global <span>Hiring</span> Center</h2>
        
        <p>Мы предлагаем официальное сотрудничество в международном формате. Гибкий график, удаленная работа со смартфона или ПК, стабильные выплаты и бесплатное профильное обучение.</p>
        
        <a href="https://t.me/worknaudalenke_bot" 
           class="btn" 
           target="_blank"
           onclick="fbq('track', 'Contact');">
            <span class="btn-icon">→</span>Подать заявку
        </a>
        
        <div style="font-size: 11px; color: #555555; margin-top: 20px; font-weight: 300; letter-spacing: 0.5px;">
            Ваша заявка будет обработана в течение 1 часа
        </div>
    </div>
</body>
</html>
